<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUILD-Lean | Gestion Totale & Causes Complètes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { touch-action: manipulation; }
        .pic-container { position: relative; overflow: auto; max-height: 65vh; border: 2px solid #e2e8f0; background: #f8fafc; min-height: 400px; touch-action: none; }
        #markersLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .task-zone { position: absolute; border: 2px solid; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); pointer-events: auto; overflow: hidden; }
        .selection-rect { position: absolute; border: 2px dashed #004587; background: rgba(0, 69, 135, 0.2); pointer-events: none; z-index: 20; }
        .status-menu { position: absolute; z-index: 100; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid #e2e8f0; min-width: 200px; }
        .tab-btn { border-bottom: 3px solid transparent; transition: all 0.2s; padding: 12px 10px; font-size: 10px; font-weight: 800; color: #64748b; }
        .tab-btn.active { border-bottom-color: #004587; color: #004587; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.1s; }
        .color-dot.selected { border-color: #000; transform: scale(1.15); }
        #reportTemplate { position: absolute; left: -9999px; top: 0; width: 800px; background: white; padding: 40px; }
        .report-header { border-bottom: 4px solid #004587; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .custom-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #dc2626; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-[1600px] mx-auto p-2 md:p-4">
        <header class="flex flex-col md:flex-row justify-between items-center mb-4 bg-white p-4 rounded-xl shadow-sm border-b-4 border-[#004587] gap-3">
            <div class="flex items-center">
                <img src="Logo 1.jpg" alt="Logo BUILD-Lean" class="h-12 w-auto"> 
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="file" id="picUpload" accept="image/*,application/pdf" class="hidden">
                <button onclick="document.getElementById('picUpload').click()" class="flex-1 bg-slate-800 text-white px-3 py-3 rounded-lg text-xs font-bold uppercase">Plan</button>
                <button onclick="generateFullReport()" class="flex-1 bg-blue-700 text-white px-3 py-3 rounded-lg text-xs font-bold uppercase shadow-lg">Exporter Rapport PDF</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="lg:col-span-3 space-y-4">
                <div class="bg-white p-1 rounded-xl shadow-sm border border-slate-200 relative">
                    <div id="modeBanner" class="hidden absolute top-0 left-0 w-full bg-indigo-600 text-white text-[10px] font-black text-center py-2 z-50 rounded-t-lg shadow-md uppercase tracking-wider">
                        <span id="modeBannerText"></span>
                        <button onclick="resetDrawingMode()" class="ml-4 underline opacity-80 hover:opacity-100 italic">Annuler (Echap)</button>
                    </div>

                    <div id="canvasWrapper" class="pic-container rounded-lg">
                        <img id="picImage" src="" alt="" class="hidden" draggable="false">
                        <div id="markersLayer"></div>
                        <div id="selectionRect" class="selection-rect hidden"></div>
                    </div>
                    
                    <div id="statusMenu" class="status-menu hidden flex flex-col overflow-hidden">
                        <div class="p-2 border-b bg-slate-50 flex justify-between gap-2">
                            <button onclick="editTaskInfo()" class="flex-1 text-[9px] uppercase font-black text-slate-600 bg-white border p-2 rounded shadow-sm">Infos ✏️</button>
                            <button onclick="setDrawingMode('redraw')" class="flex-1 text-[9px] uppercase font-black text-slate-600 bg-white border p-2 rounded shadow-sm">Forme 🔄</button>
                        </div>
                        <button onclick="setStatus('done')" class="text-left px-5 py-3 hover:bg-green-50 text-green-700 font-bold text-sm border-b">Réalisée ✅</button>
                        <button onclick="setStatus('ongoing')" class="text-left px-5 py-3 hover:bg-blue-50 text-blue-700 font-bold text-sm border-b">En cours 🏗️</button>
                        <button onclick="openDelayModal()" class="text-left px-5 py-3 hover:bg-red-50 text-red-700 font-bold text-sm border-b">Reportée ⚠️</button>
                        <button onclick="setDrawingMode('progress')" class="text-left px-5 py-3 bg-indigo-50 hover:bg-indigo-100 text-indigo-800 font-black text-xs border-b">Tracer Avancement 📏</button>
                        <button onclick="deleteActiveTask()" class="text-center py-2 text-slate-400 text-[9px] uppercase font-bold hover:bg-slate-100">Supprimer</button>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="flex overflow-x-auto border-b bg-slate-50 no-scrollbar">
                        <button onclick="switchTab('all')" class="tab-btn active shrink-0" id="tab-all">TOUTES</button>
                        <button onclick="switchTab('Fait')" class="tab-btn shrink-0" id="tab-done">FAIT</button>
                        <button onclick="switchTab('En cours')" class="tab-btn shrink-0" id="tab-ongoing">COURS</button>
                        <button onclick="switchTab('Retardé')" class="tab-btn shrink-0" id="tab-delayed">REPORT</button>
                    </div>
                    <div class="max-h-[300px] overflow-auto">
                        <table class="w-full text-left text-[11px]">

                                    <th class="p-3">Tâche</th>

                            </thead>
                            <tbody id="taskTableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>

                        <span id="ppcPercentage" class="text-4xl font-black text-slate-800">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-black mb-4 uppercase italic">Nouvelle Zone</h3>
            <input type="text" id="newTaskName" placeholder="Tâche (ex: Voile V01)" class="w-full border-2 border-slate-100 rounded-xl p-4 mb-4 text-sm outline-none focus:border-[#004587]">
            <input type="text" id="newTaskOwner" placeholder="Équipe / Entreprise" class="w-full border-2 border-slate-100 rounded-xl p-4 mb-4 text-sm outline-none focus:border-[#004587]">
            <div class="flex justify-around mb-8">
                <div onclick="selectColor('#3b82f6', this)" class="color-dot bg-blue-500 selected" data-color="#3b82f6"></div>
                <div onclick="selectColor('#ef4444', this)" class="color-dot bg-red-500" data-color="#ef4444"></div>
                <div onclick="selectColor('#f59e0b', this)" class="color-dot bg-amber-500" data-color="#f59e0b"></div>
                <div onclick="selectColor('#10b981', this)" class="color-dot bg-emerald-500" data-color="#10b981"></div>
            </div>
            <div class="flex gap-3">

                <button onclick="closeModals()" class="text-2xl font-bold hover:text-red-200">&times;</button>
            </div>
            
            <div class="p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div>
                        <h4 class="text-[11px] font-black bg-slate-100 p-2 mb-2 uppercase text-slate-700">Planning & Management</h4>
                        <div class="flex flex-col gap-2 text-xs font-bold text-slate-600">
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Planning initial irréaliste"> Planning initial irréaliste</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Tâche non planifiée"> Tâche non planifiée</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Séquencement incohérent"> Séquencement des tâches incohérent</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Priorités mal définies"> Priorités mal définies</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Coordination insuffisante"> Coordination insuffisante</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Absence de responsable"> Absence de responsable désigné</label>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-[11px] font-black bg-slate-100 p-2 mb-2 uppercase text-slate-700">Plans & Technique</h4>
                        <div class="flex flex-col gap-2 text-xs font-bold text-slate-600">
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Plans non disponibles"> Plans non disponibles</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Plans erronés/incomplets"> Plans erronés ou incomplets</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Attente validation technique"> Attente de validation technique</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Problème conception chantier"> Problème conception sur chantier</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Non-conformité précédente"> Non-conformité tâche précédente</label>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-[11px] font-black bg-slate-100 p-2 mb-2 uppercase text-slate-700">Ressources Humaines</h4>
                        <div class="flex flex-col gap-2 text-xs font-bold text-slate-600">

                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Compétences inadaptées"> Compétences non adaptées</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Sous-traitant absent"> Sous-traitant absent</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Conflit équipes"> Conflit ou désaccord entre équipes</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Consignes mal comprises"> Consignes mal comprises</label>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <h4 class="text-[11px] font-black bg-slate-100 p-2 mb-2 uppercase text-slate-700">Logistique & Matériel</h4>
                        <div class="flex flex-col gap-2 text-xs font-bold text-slate-600">
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Matériaux non livrés"> Matériaux non livrés</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Matériaux non conformes"> Matériaux non conformes</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Matériel manquant"> Matériel manquant</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Matériel en panne"> Matériel en panne</label>

                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Autorisations manquantes"> Autorisations manquantes</label>

                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Modif client non arbitrée"> Modification client non arbitrée</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Litige en cours"> Litige en cours sur le lot</label>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-[11px] font-black bg-slate-100 p-2 mb-2 uppercase text-slate-700">Autres</h4>
                        <div class="flex flex-col gap-2 text-xs font-bold text-slate-600">
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Sécurité/Environnement"> Environnement / Sécurité</label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="cause-check custom-checkbox" value="Finance/Trésorerie"> Finance / Trésorerie</label>

                    <div>
                        <h4 class="text-[11px] font-black bg-slate-100 p-2 mb-2 uppercase text-slate-700">Observation libre</h4>

    <div id="reportTemplate">
        <div class="report-header">
            <div>
                <h1 style="font-size: 28px; font-weight: 900; color: #004587;">RAPPORT DE PRODUCTION SEMAINE</h1>
                <p id="reportDate" style="color: #64748b; font-weight: bold;"></p>
            </div>
            <div style="text-align: right;">
                <img src="Logo 1.jpg" style="height: 50px; width: auto;" alt="">
            </div>
        </div>
        <div id="reportMapContainer" style="width: 100%; border: 1px solid #e2e8f0; margin-bottom: 30px;"></div>
        <div style="background: #f8fafc; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px;">
            <div id="reportPpcValue" style="font-size: 48px; font-weight: 900; color: #004587;">0%</div>
        </div>
        <div id="reportTables"></div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let tasks = JSON.parse(localStorage.getItem('build_lean_tasks')) || [];
        let ppcChart = null;
        let isDrawing = false;
        let startX, startY;
        let currentRect = { x: 0, y: 0, w: 0, h: 0 };
        let activeTaskId = null;
        let selectedColor = '#3b82f6';
        let currentFilter = 'all';
        let drawingMode = 'new';
        let editingTaskId = null;

        const wrapper = document.getElementById('canvasWrapper');
        const selectionRect = document.getElementById('selectionRect');
        const picImage = document.getElementById('picImage');

        function getCoords(e) {
            const r = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - r.left + wrapper.scrollLeft, y: clientY - r.top + wrapper.scrollTop };
        }

        const startAction = (e) => {
            if (!picImage.src || (e.target.closest('.task-zone') && drawingMode === 'new')) return;
            isDrawing = true;
            const coords = getCoords(e);
            startX = coords.x; startY = coords.y;
            selectionRect.style.left = startX + 'px'; selectionRect.style.top = startY + 'px';
            selectionRect.style.width = '0px'; selectionRect.style.height = '0px';
            selectionRect.style.borderColor = (drawingMode === 'progress') ? '#4f46e5' : '#004587';
            selectionRect.classList.remove('hidden');
        };

        const moveAction = (e) => {
            if (!isDrawing) return;
            const coords = getCoords(e);
            currentRect = { x: Math.min(coords.x, startX), y: Math.min(coords.y, startY), w: Math.abs(coords.x - startX), h: Math.abs(coords.y - startY) };
            selectionRect.style.left = currentRect.x + 'px'; selectionRect.style.top = currentRect.y + 'px';
            selectionRect.style.width = currentRect.w + 'px'; selectionRect.style.height = currentRect.h + 'px';
        };

        const endAction = () => {
            if(isDrawing && currentRect.w > 10) {
                if (drawingMode === 'new') {
                    document.getElementById('modalTitle').innerText = "Nouvelle Zone";
                    document.getElementById('modalBtn').innerText = "CRÉER";
                    document.getElementById('createModal').classList.remove('hidden');
                } else if (drawingMode === 'redraw') {
                    const t = tasks.find(x => x.id === activeTaskId);
                    if (t) { t.rect = {...currentRect}; t.progressRect = null; t.progress = 0; }
                    save(); resetDrawingMode();
                } else if (drawingMode === 'progress') {
                    const t = tasks.find(x => x.id === activeTaskId);
                    if (t) {
                        const intersection = getIntersection(t.rect, currentRect);
                        if (intersection) {
                            t.progressRect = intersection;
                            t.progress = Math.round(((intersection.w * intersection.h) / (t.rect.w * t.rect.h)) * 100);
                        }
                    }
                    save(); resetDrawingMode();
                }
            }
            isDrawing = false; selectionRect.classList.add('hidden');
        };

        wrapper.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);
        wrapper.addEventListener('touchstart', startAction, {passive: false});
        window.addEventListener('touchmove', moveAction, {passive: false});
        window.addEventListener('touchend', endAction);

        function getIntersection(r1, r2) {
            const x = Math.max(r1.x, r2.x);
            const y = Math.max(r1.y, r2.y);
            const w = Math.min(r1.x + r1.w, r2.x + r2.w) - x;
            const h = Math.min(r1.y + r1.h, r2.y + r2.h) - y;
            return (w <= 0 || h <= 0) ? null : { x, y, w, h };
        }

        function setDrawingMode(mode) {
            drawingMode = mode;
            document.getElementById('statusMenu').classList.add('hidden');
            const banner = document.getElementById('modeBanner');
            const text = document.getElementById('modeBannerText');
            if (mode === 'progress') text.innerText = "📏 TRACEZ LA ZONE RÉALISÉE SUR LE PLAN";
            else if (mode === 'redraw') text.innerText = "🔄 REDESSINEZ LE CADRE DE LA TÂCHE";
            banner.classList.remove('hidden');
        }

        function resetDrawingMode() {
            drawingMode = 'new'; editingTaskId = null;
            document.getElementById('modeBanner').classList.add('hidden');
        }

        function save() { localStorage.setItem('build_lean_tasks', JSON.stringify(tasks)); renderUI(); }

        function renderUI() {
            const markers = document.getElementById('markersLayer');
            const table = document.getElementById('taskTableBody');
            markers.innerHTML = ''; table.innerHTML = '';
            const counts = { done: 0, ongoing: 0, delayed: 0, total: tasks.length };
            
            tasks.forEach(task => {
                counts[task.status]++;
                if (currentFilter === 'all' || task.status === currentFilter) {
                    const zone = document.createElement('div');
                    zone.className = `task-zone rounded shadow-sm border-2`;
                    zone.style.left = `${task.rect.x}px`; zone.style.top = `${task.rect.y}px`;
                    zone.style.width = `${task.rect.w}px`; zone.style.height = `${task.rect.h}px`;
                    zone.style.borderColor = task.color;
                    
                    let inner = '';
                    if (task.progressRect) {
                        zone.style.background = task.color + '22';
                        const rx = task.progressRect.x - task.rect.x;
                        const ry = task.progressRect.y - task.rect.y;
                        inner += `<div style="position:absolute; left:${rx}px; top:${ry}px; width:${task.progressRect.w}px; height:${task.progressRect.h}px; background:${task.color}; opacity:0.6;"></div>`;
                    } else { zone.style.background = task.color + '44'; }
                    inner += `<span style="position:relative; z-index:5;">${task.name}<br>${task.progress || 0}%</span>`;
                    zone.innerHTML = inner;
                    zone.onclick = (e) => { e.stopPropagation(); if(drawingMode === 'new') showMenu(e, task.id); };
                    markers.appendChild(zone);

                    const row = document.createElement('tr');
                    let detail = "";
                    if (task.status === 'delayed' && task.causes) {
                        detail = `<br><span class="text-[9px] text-red-500 block">• ${task.causes.join('<br>• ')}</span>`;
                        if(task.comment) detail += `<span class="text-[9px] italic text-slate-400 block">${task.comment}</span>`;
                    }
                    row.innerHTML = `<td class="p-3 font-bold">${task.name}${detail}</td><td class="p-3 text-slate-500">${task.owner}</td><td class="p-3 text-center font-black text-indigo-600">${task.progress || 0}%</td><td class="p-3 text-right font-black uppercase text-[9px]">${task.status}</td>`;
                    table.appendChild(row);
                }
            });
            updateStats(counts);
        }

        function updateStats(c) {
            const ppc = c.total > 0 ? Math.round((c.done / c.total) * 100) : 0;
            document.getElementById('ppcPercentage').innerText = ppc + '%';
            if (ppcChart) { ppcChart.data.datasets[0].data = [c.done, c.ongoing, c.delayed]; ppcChart.update(); }
        }

        function showMenu(e, id) {
            activeTaskId = id;
            const m = document.getElementById('statusMenu');
            const x = e.touches ? e.touches[0].pageX : e.pageX;
            const y = e.touches ? e.touches[0].pageY : e.pageY;
            m.style.left = (x > window.innerWidth - 200 ? x - 200 : x) + 'px';
            m.style.top = (y > window.innerHeight - 250 ? y - 250 : y) + 'px';
            m.classList.remove('hidden');
        }

        function editTaskInfo() {
            const t = tasks.find(x => x.id === activeTaskId);
            editingTaskId = t.id;
            document.getElementById('newTaskName').value = t.name;
            document.getElementById('newTaskOwner').value = t.owner;
            document.getElementById('modalTitle').innerText = "Modifier Tâche";
            document.getElementById('createModal').classList.remove('hidden');
            document.getElementById('statusMenu').classList.add('hidden');
        }

        function confirmTask() {
            const name = document.getElementById('newTaskName').value;
            if(!name) return;
            if (editingTaskId) {
                const t = tasks.find(x => x.id === editingTaskId);
                t.name = name; t.owner = document.getElementById('newTaskOwner').value; t.color = selectedColor;
                editingTaskId = null;
            } else {
                tasks.push({ id: Date.now(), name, owner: document.getElementById('newTaskOwner').value, color: selectedColor, rect: {...currentRect}, status: 'ongoing', causes: [], comment: '', progressRect: null, progress: 0 });
            }
            save(); closeModals();
        }

        function openDelayModal() { 
            document.getElementById('statusMenu').classList.add('hidden'); 
            document.querySelectorAll('.cause-check').forEach(c => c.checked = false);
            document.getElementById('delayComment').value = "";
            document.getElementById('delayModal').classList.remove('hidden'); 
        }

        function saveDelayReasons() {
            const t = tasks.find(x => x.id === activeTaskId);
            const checks = document.querySelectorAll('.cause-check:checked');
            t.status = 'delayed'; t.causes = Array.from(checks).map(c => c.value);
            t.comment = document.getElementById('delayComment').value;
            closeModals(); save();
        }

        function setStatus(s) {
            const t = tasks.find(x => x.id === activeTaskId);
            if(t) { 
                t.status = s; t.causes = []; t.comment = '';
                if (s === 'done') { t.progress = 100; t.progressRect = {...t.rect}; }
            }
            document.getElementById('statusMenu').classList.add('hidden'); save();
        }

        function deleteActiveTask() { tasks = tasks.filter(x => x.id !== activeTaskId); document.getElementById('statusMenu').classList.add('hidden'); save(); }
        function selectColor(c, el) { selectedColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected')); el.classList.add('selected'); }
        function closeModals() { document.getElementById('createModal').classList.add('hidden'); document.getElementById('delayModal').classList.add('hidden'); resetDrawingMode(); }
        function switchTab(t) { currentFilter = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-' + t).classList.add('active'); renderUI(); }

        document.getElementById('picUpload').onchange = (e) => {
            const file = e.target.files[0]; 
            const reader = new FileReader();
            
            reader.onload = async (ev) => {
                if (file.type === 'application/pdf') {
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(ev.target.result) }).promise;
                    const page = await pdf.getPage(1); 
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas'); 
                    canvas.height = viewport.height; 
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                    picImage.src = canvas.toDataURL();
                } else { 
                    picImage.src = ev.target.result; 
                }
                picImage.classList.remove('hidden');
            };
            
            if (file) {
                reader.readAsDataURL(file);
            }
        };

        async function generateFullReport() {
            const today = new Date();
            document.getElementById('reportDate').innerText = today.toLocaleDateString('fr-FR');

            // Calcul du PPC
            const total = tasks.length;
            const done = tasks.filter(t => t.status === 'done').length;
            const ppc = total > 0 ? Math.round((done / total) * 100) : 0;
            
            const ppcElement = document.getElementById('reportPpcValue');
            ppcElement.innerHTML = `PPC Global (Taux de réussite) : <span style="color:#10b981;">${ppc}%</span>`;
            ppcElement.style.fontSize = "32px"; 

            // Capture du plan
            const mapContainer = document.getElementById('reportMapContainer');
            mapContainer.innerHTML = ''; 
            const canvasWrapper = document.getElementById('canvasWrapper');
            
            try {
                document.getElementById('selectionRect').classList.add('hidden');
                
                const canvas = await html2canvas(canvasWrapper, { useCORS: true, scale: 2 });
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/jpeg', 0.9);
                img.style.width = '100%';
                img.style.height = 'auto';
                img.style.borderRadius = '8px';
                mapContainer.appendChild(img);
            } catch (e) {
                console.error("Erreur de capture du plan", e);
            }

            // Construction des tableaux
            const tableContainer = document.getElementById('reportTables');
            let tablesHTML = '';

            const buildTable = (title, statusFilter, color) => {
                const filteredTasks = tasks.filter(t => t.status === statusFilter);
                if (filteredTasks.length === 0) return '';

                let html = `
                <div style="margin-bottom: 40px; page-break-inside: avoid;">
                    <h3 style="color: ${color}; font-size: 20px; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 3px solid ${color}; text-transform: uppercase; text-align: left;">
                        ${title} (${filteredTasks.length})
                    </h3>
                    <table style="width: 100%; border-collapse: collapse; font-size: 13px; font-family: sans-serif;">
                        <thead>
                            <tr style="background-color: #f8fafc; color: #475569;">
                                <th style="padding: 12px; text-align: left; border: 1px solid #cbd5e1; width: 25%;">Tâche</th>
                                <th style="padding: 12px; text-align: left; border: 1px solid #cbd5e1; width: 25%;">Équipe</th>
                                <th style="padding: 12px; text-align: center; border: 1px solid #cbd5e1; width: 10%;">%</th>
                `;
                
                if (statusFilter === 'delayed') {
                    html += `<th style="padding: 12px; text-align: left; border: 1px solid #cbd5e1; width: 40%;">Causes / Observations</th>`;
                } else {
                    html += `<th style="padding: 12px; text-align: center; border: 1px solid #cbd5e1; width: 40%;">Statut</th>`;
                }

                html += `</tr></thead><tbody>`;

                filteredTasks.forEach(t => {
                    let statusText = statusFilter === 'done' ? 'Réalisée' : (statusFilter === 'ongoing' ? 'En cours' : 'Reportée');
                    
                    html += `<tr>
                        <td style="padding: 10px; border: 1px solid #cbd5e1;"><strong>${t.name}</strong></td>
                        <td style="padding: 10px; border: 1px solid #cbd5e1; text-align: left;">${t.owner}</td>
                        <td style="padding: 10px; border: 1px solid #cbd5e1; text-align: center; font-weight: bold; color: #004587;">${t.progress || 0}%</td>`;
                    
                    if (statusFilter === 'delayed') {
                        let causesText = (t.causes && t.causes.length > 0) ? t.causes.join(' • ') : '';
                        let commentText = t.comment ? `<br><em style="color:#64748b;">${t.comment}</em>` : '';
                        html += `<td style="padding: 10px; border: 1px solid #cbd5e1; color: #dc2626; text-align: left;">${causesText}${commentText}</td>`;
                    } else {
                        html += `<td style="padding: 10px; border: 1px solid #cbd5e1; text-align: center; color: ${color}; font-weight: bold;">${statusText}</td>`;
                    }
                    html += `</tr>`;
                });

                html += `</tbody></table></div>`;
                return html;
            };

            tablesHTML += buildTable('✅ Tâches Réussies', 'done', '#16a34a');
            tablesHTML += buildTable('🏗️ Tâches En Cours', 'ongoing', '#2563eb');
            tablesHTML += buildTable('⚠️ Tâches Reportées', 'delayed', '#dc2626');

            tableContainer.innerHTML = tablesHTML;

            // Génération PDF
            const template = document.getElementById('reportTemplate');
            template.style.left = '0';
            template.style.zIndex = '-1';

            try {
                const finalCanvas = await html2canvas(template, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                const imgData = finalCanvas.toDataURL('image/jpeg', 1.0);
                
                const pdf = new jspdf.jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });

                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (finalCanvas.height * pdfWidth) / finalCanvas.width;
                const pageHeight = pdf.internal.pageSize.getHeight();
                
                let heightLeft = pdfHeight;
                let position = 0;

                pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, pdfHeight);
                heightLeft -= pageHeight;

                while (heightLeft > 0) {
                    position = heightLeft - pdfHeight;
                    pdf.addPage();
                    pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, pdfHeight);
                    heightLeft -= pageHeight;
                }

                pdf.save(`Rapport_BuildLean_${today.toLocaleDateString('fr-FR').replace(/\//g, '-')}.pdf`);
            } catch (e) {
                console.error("Erreur PDF", e);
                alert("Erreur lors de l'export du PDF.");
            } finally {
                template.style.left = '-9999px';
                mapContainer.innerHTML = '';
            }
        }

        // Initialisation de l'affichage
        renderUI();
    </script>
</body>
</html>
