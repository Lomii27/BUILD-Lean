<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUILD-Lean | Mobile & Desktop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        /* Optimisation Tactile */
        body { touch-action: manipulation; }
        .pic-container { 
            position: relative; 
            overflow: auto; 
            max-height: 60vh; 
            border: 2px solid #e2e8f0; 
            background: #f8fafc; 
            min-height: 400px;
            touch-action: none; /* Empêche le défilement de la page pendant le dessin */
        }
        #markersLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .task-zone { position: absolute; border: 2px solid; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); pointer-events: auto; min-width: 20px; min-height: 20px; }
        .selection-rect { position: absolute; border: 2px dashed #004587; background: rgba(0, 69, 135, 0.1); pointer-events: none; z-index: 20; }
        .status-menu { position: absolute; z-index: 100; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); padding: 12px; border: 1px solid #e2e8f0; min-width: 160px; }
        .tab-btn { border-bottom: 3px solid transparent; transition: all 0.3s; padding: 12px 8px; font-size: 10px; font-weight: 700; color: #64748b; white-space: nowrap; }
        .tab-btn.active { border-bottom-color: #004587; color: #004587; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .color-dot.selected { border-color: #000; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-[1600px] mx-auto p-2 md:p-4">
        <header class="flex flex-col md:flex-row justify-between items-center mb-4 bg-white p-4 rounded-xl shadow-sm border-b-4 border-[#004587] gap-4">
            <div class="flex items-center gap-2">
                <span class="text-xl font-black text-[#004587]">BUILD <span class="text-slate-300 font-light italic">Lean</span></span>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="file" id="picUpload" accept="image/*,application/pdf" class="hidden">
                <button onclick="document.getElementById('picUpload').click()" class="flex-1 bg-slate-800 text-white px-3 py-3 rounded-lg text-xs font-bold shadow-md">Charger Plan</button>
                <button onclick="downloadPIC()" class="flex-1 bg-green-600 text-white px-3 py-3 rounded-lg text-xs font-bold shadow-md">Télécharger</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="lg:col-span-3 space-y-4">
                <div class="bg-white p-1 rounded-xl shadow-sm border border-slate-200 relative">
                    <p class="text-[9px] text-center text-slate-400 font-bold mb-1 md:hidden">Utilisez un doigt pour dessiner une zone</p>
                    <div id="canvasWrapper" class="pic-container rounded-lg">
                        <img id="picImage" src="" alt="" class="hidden" draggable="false">
                        <div id="markersLayer"></div>
                        <div id="selectionRect" class="selection-rect hidden"></div>
                    </div>
                    
                    <div id="statusMenu" class="status-menu hidden">
                        <button onclick="setStatus('done')" class="block w-full text-left px-4 py-3 hover:bg-green-50 text-green-700 font-bold text-sm border-b">Réalisée</button>
                        <button onclick="setStatus('ongoing')" class="block w-full text-left px-4 py-3 hover:bg-blue-50 text-blue-700 font-bold text-sm border-b">En cours</button>
                        <button onclick="openDelayModal()" class="block w-full text-left px-4 py-3 hover:bg-red-50 text-red-700 font-bold text-sm border-b">Reportée</button>
                        <button onclick="deleteActiveTask()" class="block w-full text-left px-4 py-3 text-slate-400 text-xs mt-2">Supprimer</button>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="flex overflow-x-auto border-b bg-slate-50 no-scrollbar" id="tabsHeader">
                        <button onclick="switchTab('all')" class="tab-btn active shrink-0" id="tab-all">TOUTES</button>
                        <button onclick="switchTab('done')" class="tab-btn shrink-0" id="tab-done">FAIT</button>
                        <button onclick="switchTab('ongoing')" class="tab-btn shrink-0" id="tab-ongoing">COURS</button>
                        <button onclick="switchTab('delayed')" class="tab-btn shrink-0" id="tab-delayed">REPORT</button>
                    </div>
                    <div class="max-h-[300px] overflow-auto">
                        <table class="w-full text-left text-[10px]">
                            <tbody id="taskTableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
                <div class="relative h-40 flex items-center justify-center">
                    <canvas id="ppcChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="ppcPercentage" class="text-3xl font-black text-slate-800">0%</span>
                        <span class="text-[8px] font-bold text-slate-400 uppercase">PPC Semaine</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="createModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center z-[200] p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-black mb-4 uppercase italic">Nouvelle Zone</h3>
            <input type="text" id="newTaskName" placeholder="Tâche (ex: Voile)" class="w-full border-2 border-slate-100 rounded-xl p-4 mb-4 text-sm outline-none focus:border-blue-500">
            <input type="text" id="newTaskOwner" placeholder="Équipe" class="w-full border-2 border-slate-100 rounded-xl p-4 mb-4 text-sm outline-none">
            
            <div class="flex justify-between mb-6 px-2">
                <div onclick="selectColor('#3b82f6', this)" class="color-dot bg-blue-500 selected"></div>
                <div onclick="selectColor('#ef4444', this)" class="color-dot bg-red-500"></div>
                <div onclick="selectColor('#f59e0b', this)" class="color-dot bg-amber-500"></div>
                <div onclick="selectColor('#10b981', this)" class="color-dot bg-emerald-500"></div>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModals()" class="flex-1 py-4 font-bold text-slate-400">ANNULER</button>
                <button onclick="confirmTask()" class="flex-1 py-4 bg-[#004587] text-white rounded-xl font-bold shadow-lg">VALIDER</button>
            </div>
        </div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let tasks = JSON.parse(localStorage.getItem('build_lean_tasks')) || [];
        let ppcChart = null;
        let isDrawing = false;
        let startX, startY;
        let currentRect = { x: 0, y: 0, w: 0, h: 0 };
        let activeTaskId = null;
        let selectedColor = '#3b82f6';
        let currentFilter = 'all';

        const wrapper = document.getElementById('canvasWrapper');
        const selectionRect = document.getElementById('selectionRect');
        const picImage = document.getElementById('picImage');

        // GESTION TACTILE + SOURIS
        function getCoords(e) {
            const r = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - r.left + wrapper.scrollLeft,
                y: clientY - r.top + wrapper.scrollTop
            };
        }

        const startAction = (e) => {
            if (!picImage.src || e.target.closest('.task-zone')) return;
            isDrawing = true;
            const coords = getCoords(e);
            startX = coords.x;
            startY = coords.y;
            selectionRect.style.left = startX + 'px';
            selectionRect.style.top = startY + 'px';
            selectionRect.style.width = '0px';
            selectionRect.style.height = '0px';
            selectionRect.classList.remove('hidden');
        };

        const moveAction = (e) => {
            if (!isDrawing) return;
            const coords = getCoords(e);
            currentRect = { 
                x: Math.min(coords.x, startX), 
                y: Math.min(coords.y, startY), 
                w: Math.abs(coords.x - startX), 
                h: Math.abs(coords.y - startY) 
            };
            selectionRect.style.left = currentRect.x + 'px';
            selectionRect.style.top = currentRect.y + 'px';
            selectionRect.style.width = currentRect.w + 'px';
            selectionRect.style.height = currentRect.h + 'px';
        };

        const endAction = () => {
            if(isDrawing && currentRect.w > 10) document.getElementById('createModal').classList.remove('hidden');
            isDrawing = false;
            selectionRect.classList.add('hidden');
        };

        wrapper.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);

        wrapper.addEventListener('touchstart', startAction, {passive: false});
        window.addEventListener('touchmove', moveAction, {passive: false});
        window.addEventListener('touchend', endAction);

        // --- Fonctions identiques à la version précédente ---
        function save() { localStorage.setItem('build_lean_tasks', JSON.stringify(tasks)); renderUI(); }

        function renderUI() {
            const markers = document.getElementById('markersLayer');
            const table = document.getElementById('taskTableBody');
            markers.innerHTML = ''; table.innerHTML = '';
            const counts = { done: 0, ongoing: 0, delayed: 0, total: tasks.length };
            
            tasks.forEach(task => {
                counts[task.status]++;
                if (currentFilter === 'all' || task.status === currentFilter) {
                    const zone = document.createElement('div');
                    zone.className = `task-zone rounded shadow-sm`;
                    zone.style.cssText = `left:${task.rect.x}px; top:${task.rect.y}px; width:${task.rect.w}px; height:${task.rect.h}px; background:${task.color}55; border-color:${task.color};`;
                    zone.innerHTML = `<span>${task.name}</span>`;
                    zone.onclick = (e) => { e.stopPropagation(); showMenu(e, task.id); };
                    markers.appendChild(zone);

                    const row = document.createElement('tr');
                    row.innerHTML = `<td class="p-3 font-bold">${task.name}</td><td class="p-3 text-slate-500">${task.owner}</td><td class="p-3 text-right font-black uppercase text-[8px]">${task.status}</td>`;
                    table.appendChild(row);
                }
            });
            updateStats(counts);
        }

        function updateStats(c) {
            const ppc = c.total > 0 ? Math.round((c.done / c.total) * 100) : 0;
            document.getElementById('ppcPercentage').innerText = ppc + '%';
            if (ppcChart) { ppcChart.data.datasets[0].data = [c.done, c.ongoing, c.delayed]; ppcChart.update(); }
        }

        function confirmTask() {
            const name = document.getElementById('newTaskName').value;
            if(!name) return;
            tasks.push({ id: Date.now(), name, owner: document.getElementById('newTaskOwner').value, color: selectedColor, rect: {...currentRect}, status: 'ongoing', causes: [] });
            save(); closeModals();
        }

        function showMenu(e, id) {
            activeTaskId = id;
            const m = document.getElementById('statusMenu');
            const x = e.touches ? e.touches[0].pageX : e.pageX;
            const y = e.touches ? e.touches[0].pageY : e.pageY;
            m.style.left = (x > window.innerWidth - 180 ? x - 180 : x) + 'px';
            m.style.top = y + 'px';
            m.classList.remove('hidden');
        }

        function setStatus(s) {
            const t = tasks.find(x => x.id === activeTaskId);
            if(t) t.status = s;
            document.getElementById('statusMenu').classList.add('hidden');
            save();
        }

        function deleteActiveTask() { tasks = tasks.filter(x => x.id !== activeTaskId); document.getElementById('statusMenu').classList.add('hidden'); save(); }
        function selectColor(c, el) { selectedColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected')); el.classList.add('selected'); }
        function closeModals() { document.getElementById('createModal').classList.add('hidden'); }
        function switchTab(t) { currentFilter = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-' + t).classList.add('active'); renderUI(); }

        document.getElementById('picUpload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                if (file.type === 'application/pdf') {
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(ev.target.result) }).promise;
                    const page = await pdf.getPage(1);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height; canvas.width = viewport.width;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                    picImage.src = canvas.toDataURL();
                } else { picImage.src = ev.target.result; }
                picImage.classList.remove('hidden');
            };
            file.type === 'application/pdf' ? reader.readAsArrayBuffer(file) : reader.readAsDataURL(file);
        };

        window.onload = () => {
            ppcChart = new Chart(document.getElementById('ppcChart'), {
                type: 'doughnut',
                data: { datasets: [{ data: [0, 0, 0], backgroundColor: ['#10b981', '#3b82f6', '#ef4444'], borderWeight: 0 }] },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
            renderUI();
        };
    </script>
</body>
</html>
