<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUILD - LPS Chantier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .pic-container {
            position: relative;
            cursor: crosshair;
            overflow: auto;
            max-height: 75vh;
            border: 2px dashed #cbd5e1;
            background: #f8fafc;
            min-height: 500px;
            user-select: none;
        }
        #picImage { display: block; max-width: none; z-index: 1; }
        #markersLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .task-zone {
            position: absolute; border: 2px solid; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); text-align: center;
            padding: 2px; pointer-events: auto;
        }
        .selection-rect { position: absolute; border: 2px dashed #004587; background: rgba(0, 69, 135, 0.2); pointer-events: none; z-index: 20; }
        .status-done { background-image: linear-gradient(45deg, rgba(34, 197, 94, 0.3) 25%, transparent 25%); background-size: 8px 8px; border-color: #16a34a !important; }
        .status-delayed { border-color: #ef4444 !important; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .status-menu { position: absolute; z-index: 100; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); padding: 8px; display: flex; flex-direction: column; gap: 4px; min-width: 180px; border: 1px solid #e2e8f0; }
        .tab-active { border-bottom: 3px solid #004587; color: #004587; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-7xl mx-auto p-4">
        <header class="flex flex-wrap justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border-b-4 border-blue-800 gap-4">
            <div class="flex items-center gap-6">
                <div class="pl-4">
                    <span class="text-2xl font-black tracking-tighter text-[#004587]">BUILD <span class="text-slate-300 font-light">LPS</span></span>
                </div>
            </div>

            <div class="flex gap-3 items-center">
                <input type="file" id="picUpload" accept="image/*,application/pdf" class="hidden">
                <button onclick="document.getElementById('picUpload').click()" class="bg-slate-800 text-white px-5 py-2 rounded-lg hover:bg-slate-900 transition text-sm font-bold shadow-lg">1. Charger Plan</button>
                <button onclick="downloadPIC()" class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 transition text-sm font-bold shadow-lg">2. Télécharger JPG</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-200 relative overflow-hidden">
                    <div id="canvasWrapper" class="pic-container rounded-lg">
                        <img id="picImage" src="" alt="" class="hidden" draggable="false">
                        <div id="markersLayer"></div>
                        <div id="selectionRect" class="selection-rect hidden"></div>
                        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 bg-slate-50/50">
                            <p class="text-sm font-bold uppercase tracking-widest">Aucun plan chargé - Cliquez sur "Charger Plan"</p>
                        </div>
                    </div>

                    <div id="statusMenu" class="status-menu hidden">
                        <button onclick="setStatus('done')" class="flex items-center gap-3 px-3 py-2 hover:bg-green-50 text-green-700 font-bold text-xs rounded-lg transition text-left">Réalisée (Vert)</button>
                        <button onclick="setStatus('ongoing')" class="flex items-center gap-3 px-3 py-2 hover:bg-blue-50 text-blue-700 font-bold text-xs rounded-lg transition text-left">En cours (Bleu)</button>
                        <button onclick="setStatus('delayed')" class="flex items-center gap-3 px-3 py-2 hover:bg-red-50 text-red-700 font-bold text-xs rounded-lg transition text-left">Reportée (Rouge)</button>
                        <hr>
                        <button onclick="deleteActiveTask()" class="px-3 py-2 hover:bg-red-50 text-red-400 font-bold text-xs rounded-lg transition text-left">Supprimer</button>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-100 text-slate-400 font-black uppercase text-[9px]">
                            <tr><th class="p-3">Tâche</th><th class="p-3">Resp.</th><th class="p-3">Statut</th><th class="p-3">Commentaire</th></tr>
                        </thead>
                        <tbody id="taskTableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
                    <h2 class="font-black text-slate-400 mb-4 uppercase text-[10px]">PPC Semaine</h2>
                    <div class="relative h-40">
                        <canvas id="kpiChart"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="ppcValue" class="text-3xl font-black text-slate-800">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[200]">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-black mb-4 uppercase italic">Nouvelle Tâche</h3>
            <input type="text" id="modalTaskName" placeholder="Nom (ex: Voile V12)" class="w-full border rounded-xl p-3 mb-3 text-sm">
            <input type="text" id="modalTaskOwner" placeholder="Sous-traitant" class="w-full border rounded-xl p-3 mb-3 text-sm">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3 font-bold text-xs">Annuler</button>
                <button onclick="confirmTask()" class="flex-1 py-3 bg-blue-800 text-white rounded-xl font-bold text-xs">Valider</button>
            </div>
        </div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let tasks = JSON.parse(localStorage.getItem('lps_tasks')) || [];
        let kpiChart = null;
        let isDrawing = false;
        let startX, startY;
        let currentRect = { x: 0, y: 0, w: 0, h: 0 };
        let activeTaskId = null;

        const wrapper = document.getElementById('canvasWrapper');
        const selectionRect = document.getElementById('selectionRect');
        const picImage = document.getElementById('picImage');

        function saveTasks() {
            localStorage.setItem('lps_tasks', JSON.stringify(tasks));
            renderUI();
        }

        function renderUI() {
            const markersLayer = document.getElementById('markersLayer');
            const tableBody = document.getElementById('taskTableBody');
            markersLayer.innerHTML = '';
            tableBody.innerHTML = '';

            const counts = { done: 0, ongoing: 0, delayed: 0, total: tasks.length };
            
            tasks.forEach(task => {
                if(task.status === 'done') counts.done++;
                if(task.status === 'ongoing') counts.ongoing++;
                if(task.status === 'delayed') counts.delayed++;

                const zone = document.createElement('div');
                zone.className = `task-zone status-${task.status} rounded`;
                zone.style.cssText = `left:${task.rect.x}px; top:${task.rect.y}px; width:${task.rect.w}px; height:${task.rect.h}px; border-color:${task.color}; background-color:${task.color}44;`;
                zone.innerHTML = `<span>${task.name}</span>`;
                zone.onclick = (e) => { e.stopPropagation(); showStatusMenu(e, task.id); };
                markersLayer.appendChild(zone);

                const row = document.createElement('tr');
                row.innerHTML = `<td class="p-3 font-bold">${task.name}</td><td class="p-3">${task.owner}</td><td class="p-3">${task.status}</td><td class="p-3 text-red-500">${task.cause || ''}</td>`;
                tableBody.appendChild(row);
            });

            updateCharts(counts);
        }

        function updateCharts(counts) {
            const ppc = counts.total > 0 ? Math.round((counts.done / counts.total) * 100) : 0;
            document.getElementById('ppcValue').innerText = ppc + '%';
            if (kpiChart) {
                kpiChart.data.datasets[0].data = [counts.done, counts.ongoing, counts.delayed, counts.total - (counts.done+counts.ongoing+counts.delayed)];
                kpiChart.update();
            }
        }

        // Logic Dessin
        wrapper.onmousedown = function(e) {
            if (!picImage.src || e.target.closest('.task-zone')) return;
            isDrawing = true;
            const rect = wrapper.getBoundingClientRect();
            startX = e.clientX - rect.left + wrapper.scrollLeft;
            startY = e.clientY - rect.top + wrapper.scrollTop;
            selectionRect.style.left = startX + 'px';
            selectionRect.style.top = startY + 'px';
            selectionRect.style.width = '0px';
            selectionRect.style.height = '0px';
            selectionRect.classList.remove('hidden');
        };

        window.onmousemove = function(e) {
            if (!isDrawing) return;
            const rect = wrapper.getBoundingClientRect();
            const curX = e.clientX - rect.left + wrapper.scrollLeft;
            const curY = e.clientY - rect.top + wrapper.scrollTop;
            currentRect = { x: Math.min(curX, startX), y: Math.min(curY, startY), w: Math.abs(curX - startX), h: Math.abs(curY - startY) };
            selectionRect.style.left = currentRect.x + 'px';
            selectionRect.style.top = currentRect.y + 'px';
            selectionRect.style.width = currentRect.w + 'px';
            selectionRect.style.height = currentRect.h + 'px';
        };

        window.onmouseup = function() {
            if (!isDrawing) return;
            isDrawing = false;
            selectionRect.classList.add('hidden');
            if (currentRect.w > 10) document.getElementById('taskModal').classList.remove('hidden');
        };

        function confirmTask() {
            const name = document.getElementById('modalTaskName').value;
            if (!name) return;
            tasks.push({ id: Date.now(), name, owner: document.getElementById('modalTaskOwner').value, rect: {...currentRect}, status: 'ongoing', color: '#3b82f6' });
            saveTasks();
            closeModal();
        }

        function showStatusMenu(e, id) {
            activeTaskId = id;
            const menu = document.getElementById('statusMenu');
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            menu.classList.remove('hidden');
        }

        function setStatus(s) {
            const task = tasks.find(t => t.id === activeTaskId);
            if (task) { 
                task.status = s; 
                task.color = s === 'done' ? '#22c55e' : (s === 'delayed' ? '#ef4444' : '#3b82f6');
            }
            document.getElementById('statusMenu').classList.add('hidden');
            saveTasks();
        }

        function deleteActiveTask() {
            tasks = tasks.filter(t => t.id !== activeTaskId);
            document.getElementById('statusMenu').classList.add('hidden');
            saveTasks();
        }

        // Upload
        document.getElementById('picUpload').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                if (file.type === 'application/pdf') {
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(ev.target.result) }).promise;
                    const page = await pdf.getPage(1);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height; canvas.width = viewport.width;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                    picImage.src = canvas.toDataURL();
                } else {
                    picImage.src = ev.target.result;
                }
                picImage.classList.remove('hidden');
                document.getElementById('emptyState').classList.add('hidden');
            };
            file.type === 'application/pdf' ? reader.readAsArrayBuffer(file) : reader.readAsDataURL(file);
        };

        // Téléchargement
        function downloadPIC() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = picImage.naturalWidth;
            canvas.height = picImage.naturalHeight;
            ctx.drawImage(picImage, 0, 0);
            tasks.forEach(t => {
                ctx.globalAlpha = 0.4; ctx.fillStyle = t.color;
                ctx.fillRect(t.rect.x, t.rect.y, t.rect.w, t.rect.h);
                ctx.globalAlpha = 1; ctx.strokeStyle = t.color; ctx.lineWidth = 3;
                ctx.strokeRect(t.rect.x, t.rect.y, t.rect.w, t.rect.h);
                ctx.fillStyle = "black"; ctx.font = "bold 16px Arial";
                ctx.fillText(t.name, t.rect.x + 5, t.rect.y + 20);
            });
            const link = document.createElement('a');
            link.download = 'PIC_LPS_Export.jpg';
            link.href = canvas.toDataURL('image/jpeg');
            link.click();
        }

        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }

        window.onload = function() {
            kpiChart = new Chart(document.getElementById('kpiChart'), {
                type: 'doughnut',
                data: { datasets: [{ data: [0,0,0,1], backgroundColor: ['#22c55e', '#3b82f6', '#ef4444', '#f1f5f9'] }] },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
            renderUI();
        };
    </script>
</body>
</html>
